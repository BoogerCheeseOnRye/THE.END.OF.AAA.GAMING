<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE.END.OF.AAA.GAMING - 4D CUBE VALHALLA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <style>
        html,body{margin:0;padding:0;height:100vh;width:100vw;overflow:hidden;background:#000;font-family:monospace;position:relative;}
        canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:5;}
        #ncl-crystal-loader,#menu-screen{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:#000;}
        #menu-screen{flex-direction:column;gap:40px;background:rgba(0,0,0,0.96);}
        .hidden{opacity:0;pointer-events:none;}
    </style>
</head>
<body>
    <div id="ncl-crystal-loader">
        <div id="rings-container"></div>
        <div style="color:#ff00aa;font-size:48px;font-weight:900;letter-spacing:8px;text-shadow:0 0 40px #ff00aa;position:absolute;z-index:10;">TO VALHALLA</div>
    </div>
    <div id="menu-screen" class="hidden">
        <div id="game-title">THE.END.OF.AAA.GAMING</div>
        <div onclick="startGame()" class="title-button">ENTER THE VOID</div>
    </div>
    <canvas id="game-canvas"></canvas>
    <div id="overlay"></div>
    <div id="loading-screen" class="hidden"></div>
    <div id="coward-screen" class="hidden"></div>
    <div id="honor-screen" class="hidden"></div>
    <script src="js/main.js"></script>
    <script>
        window.addEventListener('load', () => {
            createNeonCrystalLoader(document.getElementById('ncl-crystal-loader'));
            setTimeout(() => {
                document.getElementById('ncl-crystal-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('menu-screen').classList.remove('hidden'), 600);
            }, 2400);
        });
    </script>
</body>
</html>
