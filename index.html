<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>THE.END.OF.AAA.GAMING - 4D CUBE VALHALLA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body style="margin:0;overflow:hidden;background:#000;font-family:monospace;">
    <div id="ncl-crystal-loader" style="position:absolute;inset:0;z-index:300;background:#000;display:flex;align-items:center;justify-content:center;"></div>
    <canvas id="game-canvas" style="display:block;z-index:5;"></canvas>
    <div id="overlay"></div>
    <div id="loading-screen" class="hidden"></div>
    <div id="coward-screen" class="hidden"></div>
    <div id="honor-screen" class="hidden"></div>
    <script src="js/main.js"></script>
    <script>
        window.addEventListener('load', () => {
            const loaderDiv = document.getElementById('ncl-crystal-loader');
            createNeonCrystalLoader(loaderDiv);
            initGame();
        });
    </script>
</body>
</html>
